identity:
  name: update_entity_profile
  author: charles
  label:
    en_US: Update Entity Profile
    zh_Hans: 更新实体画像
description:
  human:
    en_US: Update an entity profile via PATCH /entities/<object_name>. If the entity has no profile yet, the server looks it up in Dify and creates one only when Dify knows the tenant.
    zh_Hans: 通过 PATCH /entities/<object_name> 更新实体画像。若该实体尚无画像，服务端会先到 Dify 查询，只有查到时才创建画像并写入本次更新。
  llm: Partially update an entity profile identified by object_name. Only the fields you provide are changed. Appends response dispositions and behavior records, and can write any other MongoDB field via extra_fields. If no profile exists yet, the server resolves the tenant from Dify first; if Dify does not know the name, nothing is written and the call fails with "entity not found". To change monitoring or trace state, use the add_monitoring / add_trace tools instead.
parameters:
  - name: object_name
    type: string
    required: true
    label:
      en_US: Object Name
      zh_Hans: 实体名称
    human_description:
      en_US: The entity to update, e.g. a tenant name, domain id or IP address.
      zh_Hans: 要更新的实体名称，例如租户名、域账号或 IP 地址。
    llm_description: The object_name identifying the entity profile to update.
    form: llm

  - name: responses
    type: string
    required: false
    label:
      en_US: Response Dispositions
      zh_Hans: 响应处置
    human_description:
      en_US: "A response disposition record, or a JSON array of them, appended to the entity's responses. Each item: {\"app_id\": \"xxx\", \"title\": \"xxx\", \"param\": {}, \"status\": \"completed\", \"update_user\": \"xxx\"}. update_time is added by the server."
      zh_Hans: "一条响应处置记录，或多条记录的 JSON 数组，会追加到实体的 responses（保留历史）。每条结构：{\"app_id\": \"xxx\", \"title\": \"xxx\", \"param\": {}, \"status\": \"completed\", \"update_user\": \"xxx\"}。update_time 由服务端写入。"
    llm_description: "A JSON object (or array of objects) appended to the entity's responses history. Keys: app_id, title, param (object), status, update_user. Do not set update_time — the server stamps it."
    form: llm

  - name: behaviors
    type: string
    required: false
    label:
      en_US: Behavior Records
      zh_Hans: 行为数据
    human_description:
      en_US: "A behavior record, or a JSON array of them, appended to the entity's behaviors. A single record needs no array wrapper: {\"ip\": \"1.2.3.4\", \"service\": \"ssh\", \"action\": \"login\"}. The keys inside each object are free-form. update_time is added by the server."
      zh_Hans: "一条行为记录，或多条记录的 JSON 数组，会追加到实体的 behaviors。只加一条时可以直接传对象，不必套数组：{\"ip\": \"1.2.3.4\", \"service\": \"ssh\", \"action\": \"login\"}。对象内部字段不限。update_time 由服务端写入。"
    llm_description: "A behavior record as a JSON object (or an array of such objects) appended to the entity's behaviors array. For a single record just pass the object, e.g. {\"ip\": \"1.2.3.4\", \"service\": \"ssh\", \"action\": \"login\"}; use an array for several. Every element must be an object — an array containing non-objects is rejected. Keys within each object are free-form. Do not set update_time — the server stamps it."
    form: llm

  - name: extra_fields
    type: string
    required: false
    label:
      en_US: Extra Fields (JSON)
      zh_Hans: 附加字段（JSON）
    human_description:
      en_US: "A JSON object of arbitrary fields written straight into the entity's MongoDB document, e.g. {\"tenant_tags\": {\"remark\": \"xxx\"}} or the dotted form {\"tenant_tags.remark\": \"xxx\"}. Nested objects update only the named leaf, leaving sibling fields intact. A null value deletes the field. Timestamps accept an ISO-8601 string and are stored as real dates. Keys starting with $ or named _id are rejected."
      zh_Hans: "任意字段的 JSON 对象，直接写入实体在 MongoDB 中的文档，例如 {\"tenant_tags\": {\"remark\": \"xxx\"}}，也可用点号形式 {\"tenant_tags.remark\": \"xxx\"}。嵌套对象只更新指定的叶子字段，不影响同级字段。值为 null 表示删除该字段。时间字段传 ISO-8601 字符串（如 \"2026-07-20T12:00:00Z\"）会被转成真正的 Date 类型。以 $ 开头的键和 _id 会被拒绝。"
    llm_description: "A JSON object of arbitrary fields written directly into the entity's MongoDB document — the escape hatch for anything the other parameters do not cover, such as remark, security_tag, attacker_type or user_tags (all under tenant_tags). Nested objects are flattened to dotted paths, so {\"tenant_tags\": {\"remark\": \"x\"}} updates only tenant_tags.remark and leaves sibling keys intact; dotted keys like {\"basic.domainname\": \"x\"} also work. A null value DELETES the field rather than storing null. Timestamps may be written as an ISO-8601 string and are converted to real dates; an unparseable one gives a 400, as do keys beginning with $ or named _id."
    form: llm

extra:
  python:
    source: tools/update_entity_profile.py
