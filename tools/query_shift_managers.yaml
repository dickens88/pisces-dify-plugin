identity:
  name: query_shift_managers
  author: charles
  label:
    en_US: Query Shift Managers
    zh_Hans: 查询值班经理清单
description:
  human:
    en_US: Query the duty roster (duty manager and/or tracing specialist) within a time range, or look up who is on duty right now.
    zh_Hans: 查询指定时间范围内的排班清单（值班经理、溯源专员）；也可查看当前时间的值班人员。
  llm: Query the shift-manager duty roster. By default returns roster entries (manager_user, backup_user, period_start, period_end, role, note, etc.) whose duty period overlaps the past N days, covering both roles - "manager" (值班经理, duty manager) and "tracer" (溯源专员, tracing specialist). Set current_only=true to instead return the shifts covering the current date for both roles.
parameters:
  - name: days
    type: number
    required: true
    label:
      en_US: Time Range (days)
      zh_Hans: 时间范围（天）
    human_description:
      en_US: Look back this many days from now for roster entries (default 30). Ignored when "Current Duty Only" is enabled.
      zh_Hans: 查询从当前时间往前推的天数（默认 30 天）。开启"只看当前值班人员"时忽略此项。
    llm_description: Number of days to look back from now for roster entries. Default 30. Ignored when current_only is true.
    form: llm
    default: 30

  - name: current_only
    type: boolean
    required: false
    label:
      en_US: Current Duty Only
      zh_Hans: 只看当前值班人员
    human_description:
      en_US: When enabled, return only the people on shift right now (both duty manager and tracing specialist) instead of the roster list.
      zh_Hans: 开启后只返回当前时间正在值班的人员（值班经理和溯源专员），而非整个排班清单。
    llm_description: If true, return only the current on-duty shifts for both roles (the people covering the current date). Default false returns the roster list.
    form: form
    default: false

extra:
  python:
    source: tools/query_shift_managers.py
