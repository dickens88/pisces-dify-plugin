identity:
  name: stream_deeptrace_task
  author: charles
  label:
    en_US: Stream DeepTrace Task
    zh_Hans: 获取深度溯源任务流
description:
  human:
    en_US: Consume the SSE event stream of a DeepTrace session and return accumulated results.
    zh_Hans: 消费深度溯源会话的 SSE 事件流，返回累积的分析结果。
  llm: Read the real-time SSE stream of a DeepTrace session. Collects events until the run completes (event "done") or the timeout is reached. Returns the accumulated text output and event list.
parameters:
  - name: session_id
    type: string
    required: true
    label:
      en_US: Session ID
      zh_Hans: 会话 ID
    human_description:
      en_US: The session_id returned by create_deeptrace_task.
      zh_Hans: 由 create_deeptrace_task 返回的 session_id。
    llm_description: The DeepTrace session ID to stream events from.
    form: llm

  - name: timeout
    type: number
    required: false
    label:
      en_US: Timeout (seconds)
      zh_Hans: 超时时间（秒）
    human_description:
      en_US: Maximum seconds to listen for events. Defaults to 120. The tool returns accumulated results when timeout is reached.
      zh_Hans: 最大监听秒数，默认 120。超时后返回已收集的结果。
    llm_description: Max seconds to wait for the stream to complete. Default 120.
    form: form
    default: 120

extra:
  python:
    source: tools/stream_deeptrace_task.py
